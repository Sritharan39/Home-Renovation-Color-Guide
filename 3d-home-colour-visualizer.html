<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Colour Plan 3D Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0F0D0A;
            --bg2: #1A1610;
            --white: #F5F1EC;
            --muted: #8A7A60;
            --border: rgba(255,255,255,0.08);
            --gold: #C8A020;
            --gold-l: #E0BC40;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            padding: 0 24px;
            height: 54px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8, 6, 4, 0.95);
            position: sticky;
            top: 0;
            z-index: 200;
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 1rem;
            color: var(--white);
            font-weight: 600;
        }

        .logo em { color: var(--gold-l); font-style: italic; }

        .htabs {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 7px;
            overflow: hidden;
        }

        .htab {
            padding: 7px 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.68rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            transition: all 0.2s;
            font-weight: 500;
        }

        .htab.active {
            background: var(--gold);
            color: #0a0806;
            font-weight: 700;
        }

        .hbtn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.66rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 500;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.2s;
            margin-left: 8px;
        }

        .hbtn:hover { border-color: rgba(255,255,255,0.25); color: var(--white); }

        /* Main Layout */
        .int-layout {
            display: grid;
            grid-template-columns: 160px 1fr 280px;
            height: calc(100vh - 54px);
            gap: 0;
        }

        /* Left Panel - Rooms */
        .rpanel {
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 14px 8px;
            overflow-y: auto;
        }

        .plabel {
            font-size: 0.56rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
            margin-bottom: 10px;
            padding-left: 5px;
            font-weight: 600;
        }

        .rbtn {
            width: 100%;
            padding: 9px 9px;
            border-radius: 7px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            transition: all 0.2s;
            text-align: center;
        }

        .rbtn:hover { background: rgba(255,255,255,0.04); }

        .rbtn.active {
            background: rgba(200,160,32,0.12);
            border-color: rgba(200,160,32,0.3);
        }

        .rbtn-icon { font-size: 1.2rem; }

        .rbtn-name {
            font-size: 0.68rem;
            font-weight: 500;
            color: rgba(245,241,236,0.7);
        }

        .rbtn.active .rbtn-name { color: var(--gold-l); }

        /* Center Panel */
        .cpanel {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .cbar {
            padding: 11px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px;
        }

        .rname {
            font-size: 1.25rem;
            color: var(--white);
            line-height: 1;
            font-weight: 600;
        }

        .rsub {
            font-size: 0.6rem;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 0.4px;
        }

        /* Wall Tabs */
        .wtabs {
            display: flex;
            gap: 3px;
        }

        .wtab {
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-size: 0.6rem;
            letter-spacing: 0.5px;
            color: var(--muted);
            transition: all 0.2s;
            font-weight: 500;
        }

        .wtab:hover { border-color: rgba(255,255,255,0.2); color: var(--white); }

        .wtab.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #0a0806;
            font-weight: 700;
        }

        /* Scene */
        .scene-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 18px;
            overflow: hidden;
        }

        .scene-svg {
            width: 100%;
            max-width: 650px;
        }

        .scene-svg svg {
            width: 100%;
            display: block;
            filter: drop-shadow(0 14px 44px rgba(0,0,0,0.6));
        }

        .wall-poly {
            cursor: pointer;
            transition: filter 0.2s;
        }

        .wall-poly:hover {
            filter: brightness(1.2);
        }

        /* Wall Strip */
        .wstrip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 0 14px 10px;
            flex-shrink: 0;
        }

        .wcard {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
        }

        .wcard:hover { border-color: rgba(255,255,255,0.15); }

        .wcard.active {
            border-color: var(--gold);
            background: rgba(200,160,32,0.08);
        }

        .wc-lbl {
            font-size: 0.55rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .wc-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .wc-dot {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .wc-name {
            font-size: 0.64rem;
            font-weight: 500;
            color: var(--white);
        }

        .wc-code {
            font-size: 0.54rem;
            color: var(--gold);
            margin-top: 2px;
        }

        /* Info Bar */
        .sbar {
            margin: 0 14px 10px;
            padding: 9px 12px;
            background: linear-gradient(135deg, rgba(200,160,32,0.1), rgba(200,160,32,0.04));
            border: 1px solid rgba(200,160,32,0.18);
            border-radius: 7px;
            font-size: 0.68rem;
            color: var(--muted);
            line-height: 1.5;
            flex-shrink: 0;
        }

        .sbar strong { color: var(--white); }

        /* Right Panel - Color Picker */
        .ppanel {
            background: var(--bg2);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pph {
            padding: 11px 11px 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .pptitle {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .ppbadge {
            font-size: 0.58rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(200,160,32,0.14);
            color: var(--gold-l);
            border: 1px solid rgba(200,160,32,0.22);
            font-weight: 600;
        }

        .psearch {
            padding: 5px 9px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .psearch input {
            width: 100%;
            padding: 5px 9px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.68rem;
            background: rgba(255,255,255,0.04);
            color: var(--white);
            outline: none;
        }

        .psearch input::placeholder { color: var(--muted); }

        .psearch input:focus { border-color: rgba(200,160,23,0.4); }

        .cgrid {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3px;
            align-content: start;
        }

        .cchp {
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.18s;
        }

        .cchp:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .cchp.sel {
            border-color: var(--gold-l);
            box-shadow: 0 0 0 1px var(--gold-l);
        }

        .csw {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: transparent;
        }

        .cchp.sel .csw {
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .cinf {
            padding: 3px 5px 4px;
            background: rgba(10,8,5,0.7);
        }

        .cnm {
            font-size: 0.54rem;
            font-weight: 600;
            color: var(--white);
            line-height: 1.2;
        }

        .ccd {
            font-size: 0.5rem;
            color: var(--muted);
            margin-top: 1px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--white);
            color: var(--bg);
            padding: 9px 22px;
            border-radius: 30px;
            font-size: 0.74rem;
            font-weight: 600;
            z-index: 500;
            transition: transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        @media(max-width: 900px) {
            .int-layout { grid-template-columns: 1fr; }
            .rpanel { display: flex; gap: 4px; padding: 7px; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; height: auto; }
            .rbtn { flex-direction: row; min-width: 80px; padding: 8px; }
            .ppanel, .cpanel { max-height: 220px; overflow-y: auto; border-left: none; border-top: 1px solid var(--border); }
            .wstrip { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🏠 Home Colour Plan <em>3D Visualizer</em></div>
    <div class="htabs">
        <button class="htab active" onclick="showMessage()">🏠 Interior 3D</button>
    </div>
    <div style="display: flex; gap: 8px;">
        <button class="hbtn" onclick="doReset()">↺ Reset</button>
        <button class="hbtn" style="border-color: rgba(200,160,32,0.4); color: var(--gold-l);" onclick="doSummary()">📋 Summary</button>
    </div>
</div>

<div class="int-layout">
    <!-- Left Panel - Rooms -->
    <div class="rpanel" id="rpanel"></div>

    <!-- Center Panel -->
    <div class="cpanel">
        <div class="cbar">
            <div>
                <div class="rname" id="rname">Hall / Dining</div>
                <div class="rsub" id="rsub"></div>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <div class="wtabs" id="wtabs"></div>
            </div>
        </div>

        <div class="scene-wrap">
            <div class="scene-svg" id="svg3d"></div>
        </div>

        <div class="wstrip" id="wstrip"></div>
        <div class="sbar" id="sbar"></div>
    </div>

    <!-- Right Panel - Color Picker -->
    <div class="ppanel">
        <div class="pph">
            <div style="font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600;">🎨 Colours</div>
            <input type="text" id="si" placeholder="Search..." style="width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.68rem; background: rgba(255,255,255,0.04); color: var(--white); outline: none;" oninput="renderColors()">
        </div>
        <div class="cgrid" id="cgrid"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== DATA ====================

const COLORS = [
    // Asian Paints - Whites
    {id: 'AP-OW2', name: 'Pristine', hex: '#FDF8F0', cat: 'White', code: 'OW 2', price: '₹310/L', finish: 'Matt'},
    {id: 'AP-OW4', name: 'Almond White', hex: '#F4EDE0', cat: 'White', code: 'OW 4', price: '₹310/L', finish: 'Matt'},
    {id: 'AP-OW6', name: 'Off White', hex: '#EEE8DC', cat: 'White', code: 'OW 6', price: '₹310/L', finish: 'Matt'},
    {id: 'AP-OW8', name: 'Warm Sand', hex: '#F0E8D4', cat: 'White', code: 'OW 8', price: '₹310/L', finish: 'Matt'},
    {id: 'AP-OW10', name: 'Ivory Dust', hex: '#EDE0CE', cat: 'White', code: 'OW 10', price: '₹310/L', finish: 'Matt'},
    {id: 'AP-W001', name: 'Brilliant White', hex: '#F8F8F5', cat: 'White', code: 'W001', price: '₹310/L', finish: 'Matt'},
    
    // Beige/Greige
    {id: 'AP-7410', name: 'Warm Greige', hex: '#D4C4A8', cat: 'Beige', code: '7410', price: '₹340/L', finish: 'Shyne'},
    {id: 'AP-7408', name: 'Warm Taupe', hex: '#C8B898', cat: 'Beige', code: '7408', price: '₹340/L', finish: 'Shyne'},
    {id: 'AP-7514', name: 'Sand Castle', hex: '#D4BB94', cat: 'Beige', code: '7514', price: '₹340/L', finish: 'Matt'},
    {id: 'AP-7516', name: 'Khaki Dust', hex: '#C8AA7A', cat: 'Beige', code: '7516', price: '₹350/L', finish: 'Matt'},
    
    // Green
    {id: 'AP-6060', name: 'Herbal Garden', hex: '#B8C4A4', cat: 'Green', code: '6060', price: '₹360/L', finish: 'Matt'},
    {id: 'AP-6080', name: 'Sage Whisper', hex: '#D4DCC8', cat: 'Green', code: '6080', price: '₹360/L', finish: 'Matt'},
    {id: 'AP-5020', name: 'Mint Fresh', hex: '#D0ECD8', cat: 'Green', code: '5020', price: '₹360/L', finish: 'Semi-Gloss'},
    
    // Blue
    {id: 'AP-5160', name: 'Deep Teal', hex: '#3A7878', cat: 'Blue', code: '5160', price: '₹380/L', finish: 'Matt'},
    {id: 'AP-6300', name: 'Powder Blue', hex: '#C8DFF0', cat: 'Blue', code: '6300', price: '₹340/L', finish: 'Apex'},
    {id: 'AP-6320', name: 'Morning Mist', hex: '#C8D4E0', cat: 'Blue', code: '6320', price: '₹380/L', finish: 'Matt'},
    {id: 'AP-6380', name: 'Deep Navy', hex: '#1A3860', cat: 'Blue', code: '6380', price: '₹380/L', finish: 'Apex'},
    
    // Earth
    {id: 'AP-2220', name: 'Terracotta', hex: '#D4906A', cat: 'Earth', code: '2220', price: '₹370/L', finish: 'Matt'},
    {id: 'AP-2240', name: 'Burnt Sienna', hex: '#C07848', cat: 'Earth', code: '2240', price: '₹375/L', finish: 'Matt'},
    
    // Yellow
    {id: 'AP-3040', name: 'Butter Yellow', hex: '#F0E090', cat: 'Yellow', code: '3040', price: '₹360/L', finish: 'Matt'},
    {id: 'AP-3060', name: 'Saffron', hex: '#F0C048', cat: 'Yellow', code: '3060', price: '₹360/L', finish: 'Matt'},
];

const ROOMS = [
    {
        id: 'hall',
        name: 'Hall / Dining',
        emoji: '🛋️',
        sub: 'Cream Terrazzo · Shelf · TV',
        walls: ['Back Wall', 'Left Wall', 'Right Wall'],
        colors: ['AP-7410', 'AP-7410', 'AP-7410'], // Warm Greige (default)
        floor: '#E0D8C4',
        ceiling: '#F5F5F2'
    },
    {
        id: 'futurehall',
        name: 'Future Hall',
        emoji: '🏠',
        sub: 'Dark Granite · Sofa + TV planned',
        walls: ['Back Wall', 'Left Wall', 'Right Wall (TV)'],
        colors: ['AP-OW4', 'AP-OW4', 'AP-5160'], // Almond White + Deep Teal
        floor: '#4A3E34',
        ceiling: '#F0EDE8'
    },
    {
        id: 'bedroom',
        name: 'Bedroom',
        emoji: '🛏️',
        sub: 'Dark Granite · Black Bed',
        walls: ['Back (Headboard)', 'Left Wall', 'Right Wall'],
        colors: ['AP-OW8', 'AP-OW8', 'AP-OW8'], // Warm Sand (default)
        floor: '#3A3028',
        ceiling: '#F0EDE8'
    },
    {
        id: 'kitchen',
        name: 'Kitchen',
        emoji: '🍳',
        sub: 'Mosaic Tiles Right · Granite Counter',
        walls: ['Back Wall', 'Left Wall', 'Right Wall (Tiles)'],
        colors: ['AP-OW2', 'AP-OW2', 'AP-OW2'], // Pristine White
        floor: '#6A5E54',
        ceiling: '#F5F5F2'
    },
    {
        id: 'exterior',
        name: 'Exterior',
        emoji: '🏡',
        sub: '30% Dark Base · 70% Light Upper',
        walls: ['Upper Wall', 'Lower Base', 'Gate'],
        colors: ['AP-6300', 'AP-6380', 'AP-OW2'], // Powder Blue + Deep Navy + White
        floor: '#6A5E54',
        ceiling: '#87CEEB'
    }
];

// ==================== STATE ====================

let currentRoomId = 'hall';
let currentWallIdx = 0;
let roomStates = {};

// Initialize room states with defaults
ROOMS.forEach(room => {
    roomStates[room.id] = [...room.colors];
});

// ==================== HELPER FUNCTIONS ====================

function getRoom(id) {
    return ROOMS.find(r => r.id === id);
}

function getColor(id) {
    return COLORS.find(c => c.id === id);
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

function showMessage() {
    toast('🎨 Select a room and click any wall to change its colour');
}

// ==================== RENDER FUNCTIONS ====================

function renderRooms() {
    const panel = document.getElementById('rpanel');
    panel.innerHTML = '<div class="plabel">Rooms</div>' + ROOMS.map(r => `
        <button class="rbtn ${currentRoomId === r.id ? 'active' : ''}" onclick="selectRoom('${r.id}')">
            <div class="rbtn-icon">${r.emoji}</div>
            <div class="rbtn-name">${r.name}</div>
        </button>
    `).join('');
}

function selectRoom(id) {
    currentRoomId = id;
    currentWallIdx = 0;
    renderAll();
}

function renderWallTabs() {
    const room = getRoom(currentRoomId);
    const container = document.getElementById('wtabs');
    container.innerHTML = room.walls.map((wall, i) => `
        <button class="wtab ${currentWallIdx === i ? 'active' : ''}" onclick="selectWall(${i})">${wall}</button>
    `).join('');
}

function selectWall(idx) {
    currentWallIdx = idx;
    renderAll();
}

function renderInfo() {
    const room = getRoom(currentRoomId);
    document.getElementById('rname').textContent = room.emoji + ' ' + room.name;
    document.getElementById('rsub').textContent = room.sub;
}

function render3D() {
    const room = getRoom(currentRoomId);
    const colorIds = roomStates[currentRoomId];
    const colors = colorIds.map(id => {
        const c = getColor(id);
        return c ? c.hex : '#888888';
    });

    const svg = create3DRoom(room, colors);
    document.getElementById('svg3d').innerHTML = svg;
}

function create3DRoom(room, colors) {
    // Isometric 3D room - different for each room type
    const [wall1, wall2, wall3] = colors;
    const floor = room.floor;
    const ceiling = room.ceiling;

    // Create isometric 3D room SVG
    let svg = `
        <svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
            <!-- Ceiling -->
            <polygon points="300,80 470,150 470,180 300,110" fill="${ceiling}" opacity="0.9" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            
            <!-- Floor -->
            <polygon points="130,270 300,340 470,270 300,200" fill="${floor}" opacity="0.95" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            
            <!-- Left Wall (Wall 2) -->
            <polygon id="wall-1" points="130,270 130,100 300,30 300,200" fill="${wall2}" opacity="0.95" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" class="wall-poly" onclick="selectWall(1)" style="cursor: pointer;"/>
            
            <!-- Right Wall (Wall 3) -->
            <polygon id="wall-2" points="300,200 300,30 470,100 470,270" fill="${wall3}" opacity="0.85" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" class="wall-poly" onclick="selectWall(2)" style="cursor: pointer;"/>
            
            <!-- Back Wall (Wall 1) -->
            <polygon id="wall-0" points="300,110 470,180 470,270 300,200" fill="${wall1}" opacity="0.88" stroke="rgba(0,0,0,0.3)" stroke-width="2" class="wall-poly" onclick="selectWall(0)" style="cursor: pointer;"/>
            
            <!-- Highlight selected wall -->
            ${currentWallIdx === 0 ? '<polygon points="300,110 470,180 470,270 300,200" fill="none" stroke="' + colors[0] + '" stroke-width="3" opacity="0.5"/>' : ''}
            ${currentWallIdx === 1 ? '<polygon points="130,270 130,100 300,30 300,200" fill="none" stroke="' + colors[1] + '" stroke-width="3" opacity="0.5"/>' : ''}
            ${currentWallIdx === 2 ? '<polygon points="300,200 300,30 470,100 470,270" fill="none" stroke="' + colors[2] + '" stroke-width="3" opacity="0.5"/>' : ''}
            
            <!-- Labels -->
            <text x="370" y="225" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">${getRoom(currentRoomId).name}</text>
        </svg>
    `;
    return svg;
}

function renderWallStrip() {
    const room = getRoom(currentRoomId);
    const colorIds = roomStates[currentRoomId];
    
    const html = room.walls.map((wall, i) => {
        const colorId = colorIds[i];
        const color = getColor(colorId);
        const hex = color ? color.hex : '#888888';
        const name = color ? color.name : 'Unknown';
        const code = color ? color.code : '—';
        
        return `
            <div class="wcard ${currentWallIdx === i ? 'active' : ''}" onclick="selectWall(${i})">
                <div class="wc-lbl">Wall ${i + 1}</div>
                <div class="wc-row">
                    <div class="wc-dot" style="background: ${hex};"></div>
                </div>
                <div class="wc-name">${name}</div>
                <div class="wc-code">${code}</div>
            </div>
        `;
    }).join('');
    
    document.getElementById('wstrip').innerHTML = html;
}

function renderInfo2() {
    const room = getRoom(currentRoomId);
    const colorId = roomStates[currentRoomId][currentWallIdx];
    const color = getColor(colorId);
    
    let info = `<strong>${room.walls[currentWallIdx]}</strong> → ${color ? color.name : 'Unknown'}`;
    if (color) {
        info += ` (${color.code}) · ${color.finish} · ${color.price}`;
    }
    
    document.getElementById('sbar').innerHTML = info;
}

function renderColors() {
    const search = document.getElementById('si').value.toLowerCase();
    let list = COLORS;
    
    if (search) {
        list = list.filter(c => 
            c.name.toLowerCase().includes(search) || 
            c.code.toLowerCase().includes(search)
        );
    }
    
    const currentColorId = roomStates[currentRoomId][currentWallIdx];
    const html = list.map(c => `
        <div class="cchp ${c.id === currentColorId ? 'sel' : ''}" onclick="applyColor('${c.id}')">
            <div class="csw" style="background: ${c.hex}">✓</div>
            <div class="cinf">
                <div class="cnm">${c.name}</div>
                <div class="ccd">${c.code}</div>
            </div>
        </div>
    `).join('');
    
    document.getElementById('cgrid').innerHTML = html;
}

function applyColor(colorId) {
    roomStates[currentRoomId][currentWallIdx] = colorId;
    const color = getColor(colorId);
    toast(`${getRoom(currentRoomId).walls[currentWallIdx]} → ${color.name}`);
    renderAll();
}

function renderAll() {
    renderRooms();
    renderWallTabs();
    renderInfo();
    render3D();
    renderWallStrip();
    renderInfo2();
    renderColors();
}

function doReset() {
    ROOMS.forEach(room => {
        roomStates[room.id] = [...room.colors];
    });
    toast('All rooms reset to defaults');
    renderAll();
}

function doSummary() {
    let summary = '🏠 YOUR COLOUR PLAN\n\n';
    ROOMS.forEach(room => {
        summary += `${room.emoji} ${room.name}\n`;
        room.walls.forEach((wall, i) => {
            const colorId = roomStates[room.id][i];
            const color = getColor(colorId);
            summary += `  ${wall}: ${color ? color.name + ' (' + color.code + ')' : 'Unknown'}\n`;
        });
        summary += '\n';
    });
    alert(summary);
}

// ==================== INITIALIZE ====================

document.addEventListener('DOMContentLoaded', function() {
    renderAll();
});
</script>

</body>
</html>
